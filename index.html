  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

">Vrstvy<\u002Fa>\n        <a href=\"#synteza\" class=\"nvd-navlink\">Syntéza<\u002Fa>\n      <\u002Fdiv>\n      <button type=\"button\" onclick=\"{{ toTop }}\" aria-label=\"Nahoru\" title=\"Nahoru\" style=\"display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;border:1.5px solid #ea935a;background:#fff;color:#ea935a;cursor:pointer;\">\n        <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" aria-hidden=\"true\"><path d=\"M8 13 V3 M3.5 7 L8 2.5 L12.5 7\" stroke=\"#ea935a\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n    <\u002Fnav>\n\n    <!-- HEADER -->\n    <header style=\"padding:36px 0 8px;\">\n      <div style=\"display:flex;align-items:center;gap:12px;flex-wrap:wrap;\">\n        <span aria-hidden=\"true\" style=\"display:inline-flex;align-items:center;justify-content:center;width:40px;height:52px;\">\n          <svg width=\"40\" height=\"52\" viewBox=\"0 0 40 52\"><path d=\"M20 3 C9 3 5 14 5 23 C5 35 15 42 20 42 C25 42 35 35 35 23 C35 14 31 3 20 3 Z\" fill=\"#6f4e9c\"><\u002Fpath><polygon points=\"17,41 23,41 20,47\" fill=\"#6f4e9c\"><\u002Fpolygon><path d=\"M20 47 C22 49 17 50 20 52\" fill=\"none\" stroke=\"#6f4e9c\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fpath><text x=\"20\" y=\"29\" text-anchor=\"middle\" font-family=\"Fredoka,sans-serif\" font-weight=\"700\" font-size=\"17\" fill=\"#fffdf9\">#<\u002Ftext><\u002Fsvg>\n        <\u002Fspan>\n        <span style=\"font-family:'Fredoka',sans-serif;font-weight:600;letter-spacing:.04em;color:#6f4e9c;font-size:15px;text-transform:uppercase;\">Nevypusť duši<\u002Fspan>\n        <span style=\"flex:1;\"><\u002Fspan>\n        <span style=\"display:inline-flex;align-items:center;gap:7px;background:#fbe6d2;color:#9a5a25;border:1px solid #f0c79c;border-radius:999px;padding:6px 13px;font-size:12.5px;font-weight:700;\">\n          <span aria-hidden=\"true\" style=\"width:8px;height:8px;border-radius:50%;background:#ea935a;display:inline-block;\"><\u002Fspan>\n          Interní podklad — nešířit\n        <\u002Fspan>\n      <\u002Fdiv>\n\n      <h1 style=\"font-family:'Fredoka',sans-serif;font-weight:700;color:#5b3f86;font-size:clamp(38px,7vw,72px);line-height:1.02;margin:26px 0 6px;letter-spacing:-.01em;\">Rezilience v Česku<\u002Fh1>\n      <p style=\"font-family:'Fredoka',sans-serif;font-weight:500;color:#ea935a;font-size:clamp(20px,3.2vw,30px);margin:0;\">mapa tématu — kdo v ČR pracuje s „reziliencí\"<\u002Fp>\n      <p style=\"max-width:660px;color:#5a5365;font-size:17px;margin:18px 0 0;\">Nejdřív rychlá orientace, pak proklik do hloubky. Pět „světů\" rezilience, jejich aktéři a u každého <strong style=\"color:#5b3f86;font-weight:700;\">Vhled pro Nevypusť<\u002Fstrong> — kde je příležitost, kde hrozba a co je dobré vědět.<\u002Fp>\n    <\u002Fheader>\n\n    <!-- COLOPHON -->\n    <section aria-label=\"Úvodní slovo\" style=\"margin:28px 0 8px;background:#fffdf9;border:1px solid #e7dcc6;border-radius:18px;padding:24px 26px;\">\n      <div style=\"display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap;\">\n        <span aria-hidden=\"true\" style=\"flex:none;display:inline-flex;align-items:center;justify-content:center;width:46px;height:60px;margin-top:2px;\">\n          <svg width=\"46\" height=\"60\" viewBox=\"0 0 46 60\"><path d=\"M23 4 C10 4 5 16 5 27 C5 40 17 49 23 49 C29 49 41 40 41 27 C41 16 36 4 23 4 Z\" fill=\"#ef9e63\"><\u002Fpath><ellipse cx=\"17\" cy=\"20\" rx=\"5\" ry=\"7\" fill=\"#fff\" opacity=\"0.3\"><\u002Fellipse><polygon points=\"19,48 27,48 23,55\" fill=\"#ef9e63\"><\u002Fpolygon><path d=\"M23 55 C25 57 20 58 23 60\" fill=\"none\" stroke=\"#ef9e63\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fspan>\n        <div style=\"flex:1;min-width:260px;\">\n          <div style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:20px;color:#5b3f86;margin-bottom:8px;\">Čau 👋<\u002Fdiv>\n          <p style=\"font-size:15.5px;color:#4a4452;margin:0 0 12px;max-width:760px;\">V našem týmu nás zajímalo, <strong>jak se téma rezilience objevuje v Česku a v jakých souvislostech<\u002Fstrong>. Tady jsou první vhledy. Rešerše vznikla metodou <strong>human-in-the-loop<\u002Fstrong> — ve spolupráci s Claude&nbsp;Opus (Anthropic) a&nbsp;Codex (OpenAI) v diskusi se mnou.<\u002Fp>\n          <p style=\"font-size:15.5px;color:#4a4452;margin:0 0 12px;max-width:760px;\">Nebylo v mých silách, ale ani v mém plánu vše ověřovat — je to <strong>rámcový přehled<\u002Fstrong>, takže to tak berme. <strong style=\"color:#b3503f;\">Než s něčím začneme dál pracovat, radši si to ověřme a upřesněme.<\u002Fstrong><\u002Fp>\n          <p style=\"font-size:15.5px;color:#4a4452;margin:0;max-width:760px;\">A když narazíš na nesrovnalost nebo budeš chtít něco doplnit, napiš mi to do <a href=\"https://trello.com/c/ak9Z4uOO/507-inspirace-pro-re%C5%A1er%C5%A1i-odolnost-rezilinece-atp\" target=\"_blank\" rel=\"noopener noreferrer\">karty v Trellu<\u002Fa>. Těším se na komenty, Petra&nbsp;K.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:18px;padding-top:15px;border-top:1px dashed #e7dcc6;font-size:13px;color:#6f6878;display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:10px 22px;\">\n        <span><strong style=\"color:#5b3f86;\">Stav:<\u002Fstrong> červen 2026, odkazy kontrolovány k 21.&nbsp;6.&nbsp;2026 — časem se mění.<\u002Fspan>\n        <span><strong style=\"color:#5b3f86;\">Jak číst:<\u002Fstrong> mapuje veřejně dohledatelné aktéry; Vhled pro Nevypusť = analytické hypotézy, ne stanoviska zmíněných organizací.<\u002Fspan>\n        <span><strong style=\"color:#5b3f86;\">Terminologie:<\u002Fstrong> přednostně „rezilience\"; „odolnost\"/„resilience\" tam, kde to používá zdroj nebo název programu.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ORIENTACE: CO / KDO / JAK -->\n    <section aria-label=\"Co, kdo, jak\" style=\"margin:36px 0;\">\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;\">\n        <sc-for list=\"{{ orient }}\" as=\"o\" hint-placeholder-count=\"3\">\n          <div style=\"background:#fffdf9;border:1px solid #e7dcc6;border-radius:18px;padding:22px 22px 24px;\">\n            <div style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:13px;color:#ea935a;letter-spacing:.06em;\">{{ o.num }}<\u002Fdiv>\n            <div style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:22px;color:#5b3f86;margin:4px 0 8px;\">{{ o.title }}<\u002Fdiv>\n            <div style=\"font-size:15px;color:#4a4452;\">{{ o.body }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- BALLOONS SIGNATURE -->\n    <section aria-labelledby=\"balloons-h\" style=\"margin:46px 0 30px;text-align:center;background:linear-gradient(180deg,#efe3f3 0%,#f3ead9 100%);border-radius:24px;padding:34px 20px 30px;border:1px solid #e4d3ec;\">\n      <h2 id=\"balloons-h\" style=\"font-family:'Fredoka',sans-serif;font-weight:600;color:#5b3f86;font-size:24px;margin:0 0 4px;\">Pět balonků, pět světů<\u002Fh2>\n      <p style=\"color:#6f6878;font-size:14.5px;margin:0 0 14px;\">Každý balonek je jeden svět rezilience — všechny uvázané na jednom slově. Klikni a svět se rozbalí.<\u002Fp>\n      <div role=\"group\" aria-label=\"Navigace po světech\" style=\"display:flex;justify-content:center;align-items:flex-end;gap:clamp(6px,2.5vw,26px);flex-wrap:wrap;max-width:760px;margin:0 auto;\">\n        <sc-for list=\"{{ worlds }}\" as=\"world\" hint-placeholder-count=\"5\">\n          <button type=\"button\" class=\"nvd-balloon\" onclick=\"{{ world.balloonClick }}\" aria-expanded=\"{{ world.open }}\" aria-controls=\"world-{{ world.id }}\" aria-label=\"{{ world.balloonLabel }}\" style=\"background:none;border:none;cursor:pointer;padding:4px;\">\n            <span class=\"nvd-balloon-float\">\n              <svg width=\"74\" height=\"106\" viewBox=\"0 0 74 106\" aria-hidden=\"true\">\n                <path d=\"M37 5 C16 5 9 24 9 41 C9 62 27 73 37 73 C47 73 65 62 65 41 C65 24 58 5 37 5 Z\" fill=\"{{ world.balloon }}\"><\u002Fpath>\n                <ellipse cx=\"28\" cy=\"28\" rx=\"7\" ry=\"10\" fill=\"#ffffff\" opacity=\"0.28\"><\u002Fellipse>\n                <polygon points=\"32,72 42,72 37,82\" fill=\"{{ world.balloon }}\"><\u002Fpolygon>\n                <path d=\"M37 82 C41 88 31 92 37 98 C40 101 35 103 37 106\" fill=\"none\" stroke=\"{{ world.balloon }}\" stroke-width=\"2\" stroke-linecap=\"round\" opacity=\"0.65\"><\u002Fpath>\n                <text x=\"37\" y=\"50\" text-anchor=\"middle\" font-family=\"Fredoka,sans-serif\" font-weight=\"700\" font-size=\"28\" fill=\"#fffdf9\">{{ world.num }}<\u002Ftext>\n              <\u002Fsvg>\n              <span style=\"display:block;text-align:center;font-size:11.5px;font-weight:700;color:#5b3f86;max-width:92px;line-height:1.2;margin-top:-2px;\">{{ world.short }}<\u002Fspan>\n            <\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:clamp(34px,7vw,60px);color:#5b3f86;letter-spacing:-.01em;margin-top:6px;\">rezilience<\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- SEARCH -->\n    <section aria-labelledby=\"search-h\" style=\"margin:36px 0;background:#fffdf9;border:1px solid #e7dcc6;border-radius:20px;padding:22px 24px 26px;\">\n      <h2 id=\"search-h\" style=\"font-family:'Fredoka',sans-serif;font-weight:600;color:#5b3f86;font-size:22px;margin:0 0 4px;\">Hledat napříč aktéry<\u002Fh2>\n      <p style=\"color:#6f6878;font-size:14px;margin:0 0 14px;\">Fulltext přes názvy, popisy i čočku NVD. Filtruj podle světa.<\u002Fp>\n      <label style=\"display:block;position:relative;\">\n        <span style=\"position:absolute;left:16px;top:50%;transform:translateY(-50%);color:#b59a76;\" aria-hidden=\"true\">\n          <svg width=\"18\" height=\"18\" viewBox=\"0 0 18 18\" fill=\"none\"><circle cx=\"8\" cy=\"8\" r=\"6\" stroke=\"#b59a76\" stroke-width=\"2\"><\u002Fcircle><path d=\"M12.5 12.5 L16 16\" stroke=\"#b59a76\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fspan>\n        <span style=\"position:absolute;left:-9999px;\">Hledat aktéra<\u002Fspan>\n        <input type=\"search\" value=\"{{ query }}\" oninput=\"{{ onSearch }}\" placeholder=\"Např. NUDZ, školy, dezinformace, OSF…\" style=\"width:100%;font-family:inherit;font-size:16px;color:#38323f;background:#f7f1e6;border:1px solid #e7dcc6;border-radius:12px;padding:13px 16px 13px 44px;\">\n      <\u002Flabel>\n      <div role=\"group\" aria-label=\"Filtr podle světa\" style=\"display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;\">\n        <sc-for list=\"{{ chips }}\" as=\"chip\" hint-placeholder-count=\"6\">\n          <button type=\"button\" onclick=\"{{ chip.onClick }}\" aria-pressed=\"{{ chip.active }}\" style=\"font-family:'Mulish',sans-serif;font-weight:700;font-size:13px;cursor:pointer;border-radius:999px;padding:8px 14px;border:1.5px solid {{ chip.border }};background:{{ chip.bg }};color:{{ chip.fg }};\">{{ chip.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ searchActive }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"margin-top:18px;\">\n          <div aria-live=\"polite\" style=\"font-size:13px;font-weight:700;color:#6f6878;margin-bottom:10px;\">{{ resultLabel }}<\u002Fdiv>\n          <ul style=\"list-style:none;margin:0;padding:0;display:grid;gap:8px;\">\n            <sc-for list=\"{{ results }}\" as=\"r\" hint-placeholder-count=\"4\">\n              <li style=\"display:flex;gap:12px;align-items:flex-start;background:#f7f1e6;border:1px solid #ece1d0;border-radius:12px;padding:12px 14px;\">\n                <span aria-hidden=\"true\" style=\"margin-top:3px;width:11px;height:11px;border-radius:50%;flex:none;background:{{ r.balloon }};\"><\u002Fspan>\n                <span style=\"flex:1;min-width:0;\">\n                  <span style=\"display:flex;gap:8px;align-items:baseline;flex-wrap:wrap;\">\n                    <sc-if value=\"{{ r.hasUrl }}\" hint-placeholder-val=\"{{ true }}\"><a href=\"{{ r.url }}\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-weight:700;font-size:15.5px;\">{{ r.name }}<\u002Fa><\u002Fsc-if>\n                    <sc-if value=\"{{ r.noUrl }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font-weight:700;font-size:15.5px;color:#38323f;\">{{ r.name }}<\u002Fspan><\u002Fsc-if>\n                    <span style=\"font-size:11.5px;font-weight:700;color:{{ r.balloon }};background:#fff;border:1px solid #ece1d0;border-radius:6px;padding:2px 7px;\">{{ r.worldShort }}<\u002Fspan>\n                    <span style=\"font-size:11.5px;color:#8a8294;\">{{ r.type }}<\u002Fspan>\n                  <\u002Fspan>\n                  <sc-if value=\"{{ r.hasNote }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"display:block;font-size:14px;color:#5a5365;margin-top:3px;\">{{ r.note }}<\u002Fspan><\u002Fsc-if>\n                <\u002Fspan>\n              <\u002Fli>\n            <\u002Fsc-for>\n          <\u002Ful>\n          <sc-if value=\"{{ noResults }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:14px;color:#8a8294;padding:14px 4px;\">Nic nenalezeno. Zkus jiné slovo nebo jiný svět.<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsection>\n\n    <!-- TOOLBAR -->\n    <div class=\"nvd-noprint\" role=\"group\" aria-label=\"Ovládání\" style=\"display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin:36px 0 -8px;\">\n      <span style=\"margin-right:auto;font-size:13px;color:#8a8294;\">Tip: balonek nahoře otevře svět rovnou.<\u002Fspan>\n      <button type=\"button\" onclick=\"{{ expandAll }}\" style=\"font-family:'Mulish',sans-serif;font-weight:700;font-size:13px;cursor:pointer;border-radius:999px;padding:8px 15px;border:1.5px solid #d8c6ec;background:#f3eafb;color:#5b3f86;\">Rozbalit vše<\u002Fbutton>\n      <button type=\"button\" onclick=\"{{ collapseAll }}\" style=\"font-family:'Mulish',sans-serif;font-weight:700;font-size:13px;cursor:pointer;border-radius:999px;padding:8px 15px;border:1.5px solid #e0d2bb;background:#f7f1e6;color:#6f6878;\">Sbalit vše<\u002Fbutton>\n      <button type=\"button\" onclick=\"{{ printAll }}\" style=\"font-family:'Mulish',sans-serif;font-weight:700;font-size:13px;cursor:pointer;border-radius:999px;padding:8px 16px;border:1.5px solid #5b3f86;background:#5b3f86;color:#fffdf9;display:inline-flex;align-items:center;gap:7px;\"><span aria-hidden=\"true\">🖨<\u002Fspan> Tisk / PDF<\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- WORLDS -->\n    <section aria-labelledby=\"worlds-h\" id=\"svety\" style=\"margin:24px 0 44px;scroll-margin-top:72px;\">\n      <h2 id=\"worlds-h\" style=\"font-family:'Fredoka',sans-serif;font-weight:600;color:#5b3f86;font-size:clamp(24px,4vw,32px);margin:0 0 4px;\">Pět světů rezilience<\u002Fh2>\n      <p style=\"color:#6f6878;font-size:15px;margin:0 0 20px;max-width:680px;\">Pracovní analytická typologie této mapy — diskurzy se překrývají. Rozklikni svět: popis, aktéři podle typu a čočka NVD.<\u002Fp>\n\n      <div style=\"display:grid;gap:16px;\">\n        <sc-for list=\"{{ worlds }}\" as=\"world\" hint-placeholder-count=\"5\">\n          <article id=\"world-{{ world.id }}\" style=\"background:{{ world.bg }};border:1px solid {{ world.accentSoft }};border-radius:20px;overflow:hidden;scroll-margin-top:16px;\">\n            <button type=\"button\" onclick=\"{{ world.toggle }}\" aria-expanded=\"{{ world.open }}\" aria-controls=\"world-body-{{ world.id }}\" style=\"width:100%;display:flex;gap:16px;align-items:center;text-align:left;background:transparent;border:none;cursor:pointer;padding:20px 22px;font-family:inherit;\">\n              <span aria-hidden=\"true\" style=\"flex:none;display:inline-flex;align-items:center;justify-content:center;width:46px;height:46px;border-radius:50%;background:{{ world.balloon }};color:#fffdf9;font-family:'Fredoka',sans-serif;font-weight:700;font-size:22px;\">{{ world.num }}<\u002Fspan>\n              <span style=\"flex:1;min-width:0;\">\n                <span style=\"display:flex;gap:10px;align-items:baseline;flex-wrap:wrap;\">\n                  <span style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:clamp(18px,2.6vw,23px);color:#3a2f4d;\">{{ world.title }}<\u002Fspan>\n                  <sc-if value=\"{{ world.hasBadge }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:11.5px;font-weight:700;color:#fffdf9;background:{{ world.accent }};border-radius:999px;padding:3px 10px;\">{{ world.badge }}<\u002Fspan><\u002Fsc-if>\n                <\u002Fspan>\n                <span style=\"display:block;font-size:13.5px;color:{{ world.accent }};font-weight:700;margin-top:2px;\">{{ world.keyword }}<\u002Fspan>\n              <\u002Fspan>\n              <span aria-hidden=\"true\" style=\"flex:none;color:{{ world.accent }};font-size:20px;transition:transform .2s ease;transform:{{ world.chev }};\">▸<\u002Fspan>\n            <\u002Fbutton>\n\n            <sc-if value=\"{{ world.open }}\" hint-placeholder-val=\"{{ false }}\">\n              <div id=\"world-body-{{ world.id }}\" class=\"nvd-reveal\" style=\"padding:0 22px 24px;\">\n                <p style=\"font-size:15.5px;color:#4a4452;max-width:760px;margin:0 0 18px;\">{{ world.desc }}<\u002Fp>\n\n                <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;\">\n                  <sc-for list=\"{{ world.groups }}\" as=\"g\" hint-placeholder-count=\"4\">\n                    <div style=\"background:#fffdf9;border:1px solid #ece1d0;border-radius:14px;padding:15px 16px;\">\n                      <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:9px;\">\n                        <span aria-hidden=\"true\" style=\"width:9px;height:9px;border-radius:2px;background:{{ g.color }};\"><\u002Fspan>\n                        <span style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:13.5px;color:{{ g.color }};letter-spacing:.02em;\">{{ g.label }}<\u002Fspan>\n                      <\u002Fdiv>\n                      <ul style=\"list-style:none;margin:0;padding:0;display:grid;gap:8px;\">\n                        <sc-for list=\"{{ g.items }}\" as=\"it\" hint-placeholder-count=\"4\">\n                          <li style=\"font-size:14px;color:#4a4452;line-height:1.45;\">\n                            <sc-if value=\"{{ it.hasUrl }}\" hint-placeholder-val=\"{{ true }}\"><a href=\"{{ it.url }}\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-weight:700;\">{{ it.name }}<\u002Fa><\u002Fsc-if>\n                            <sc-if value=\"{{ it.noUrl }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font-weight:700;color:#38323f;\">{{ it.name }}<\u002Fspan><\u002Fsc-if>\n                            <sc-if value=\"{{ it.hasNote }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"color:#6f6878;\"> — {{ it.note }}<\u002Fspan><\u002Fsc-if>\n                          <\u002Fli>\n                        <\u002Fsc-for>\n                      <\u002Ful>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n\n                <div style=\"margin-top:18px;\">\n                  <div style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:15px;color:#5b3f86;margin-bottom:10px;display:flex;align-items:center;gap:8px;\">\n                    <span aria-hidden=\"true\">🎈<\u002Fspan> Vhled pro Nevypusť\n                  <\u002Fdiv>\n                  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;\">\n                    <div style=\"background:#e4f0e8;border:1px solid #c4e0d0;border-radius:14px;padding:14px 15px;\">\n                      <div style=\"font-size:12px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#2f7d57;margin-bottom:8px;\">Příležitost<\u002Fdiv>\n                      <ul style=\"margin:0;padding-left:18px;display:grid;gap:7px;font-size:13.5px;color:#3a4a40;\">\n                        <sc-for list=\"{{ world.opp }}\" as=\"x\" hint-placeholder-count=\"2\"><li>{{ x }}<\u002Fli><\u002Fsc-for>\n                      <\u002Ful>\n                    <\u002Fdiv>\n                    <div style=\"background:#f7e3de;border:1px solid #ecc9c0;border-radius:14px;padding:14px 15px;\">\n                      <div style=\"font-size:12px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#b3503f;margin-bottom:8px;\">Hrozba<\u002Fdiv>\n                      <ul style=\"margin:0;padding-left:18px;display:grid;gap:7px;font-size:13.5px;color:#5a3a33;\">\n                        <sc-for list=\"{{ world.threat }}\" as=\"x\" hint-placeholder-count=\"2\"><li>{{ x }}<\u002Fli><\u002Fsc-for>\n                      <\u002Ful>\n                    <\u002Fdiv>\n                    <div style=\"background:#efeae0;border:1px solid #ddd4c5;border-radius:14px;padding:14px 15px;\">\n                      <div style=\"font-size:12px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#7a6f5c;margin-bottom:8px;\">Dobré vědět<\u002Fdiv>\n                      <ul style=\"margin:0;padding-left:18px;display:grid;gap:7px;font-size:13.5px;color:#534b3d;\">\n                        <sc-for list=\"{{ world.note }}\" as=\"x\" hint-placeholder-count=\"2\"><li>{{ x }}<\u002Fli><\u002Fsc-for>\n                      <\u002Ful>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Farticle>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- SCHOOLS DEEP ZOOM -->\n    <section aria-labelledby=\"schools-h\" id=\"schools\" style=\"margin:44px 0;background:#fdf3e6;border:1.5px solid #f0d4b0;border-radius:22px;overflow:hidden;scroll-margin-top:72px;\">\n      <button type=\"button\" onclick=\"{{ schoolsToggle }}\" aria-expanded=\"{{ schoolsOpen }}\" aria-controls=\"schools-body\" style=\"width:100%;display:flex;gap:16px;align-items:center;text-align:left;background:transparent;border:none;cursor:pointer;padding:24px 24px;font-family:inherit;\">\n        <span aria-hidden=\"true\" style=\"flex:none;display:inline-flex;align-items:center;justify-content:center;width:52px;height:52px;border-radius:14px;background:#ea935a;color:#fffdf9;font-size:26px;\">🔍<\u002Fspan>\n        <span style=\"flex:1;\">\n          <span style=\"display:block;font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#c77f3f;\">Hloubkový zoom<\u002Fspan>\n          <span style=\"display:block;font-family:'Fredoka',sans-serif;font-weight:600;font-size:clamp(22px,4vw,30px);color:#7a4a1e;\">Rezilience do škol<\u002Fspan>\n          <span style=\"display:block;font-size:14px;color:#9a7a52;margin-top:2px;\">Systémové okno 2025–2031 · data · programy<\u002Fspan>\n        <\u002Fspan>\n        <span aria-hidden=\"true\" style=\"flex:none;color:#ea935a;font-size:22px;transition:transform .2s ease;transform:{{ schoolsChev }};\">▸<\u002Fspan>\n      <\u002Fbutton>\n\n      <sc-if value=\"{{ schoolsOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div id=\"schools-body\" class=\"nvd-reveal\" style=\"padding:0 24px 28px;\">\n          <p style=\"font-size:15.5px;color:#5a4a36;max-width:780px;margin:0 0 22px;\">Školy jsou jednou z nejviditelnějších a nejrychleji se měnících částí oblasti duševního zdraví. Jde o interpretační závěr, ne o úplný census trhu.<\u002Fp>\n\n          <div style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:17px;color:#7a4a1e;margin:0 0 12px;\">Systémové okno 2025–2031<\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;\">\n            <sc-for list=\"{{ schoolWindow }}\" as=\"w\" hint-placeholder-count=\"3\">\n              <div style=\"background:#fffdf9;border:1px solid #f0d9bd;border-radius:14px;padding:16px 17px;\">\n                <div style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:24px;color:#ea935a;\">{{ w.num }}<\u002Fdiv>\n                <div style=\"font-weight:700;font-size:15px;color:#5b3f86;margin:2px 0 6px;\">{{ w.head }}<\u002Fdiv>\n                <div style=\"font-size:13.8px;color:#5a4a36;\">{{ w.body }} <sc-if value=\"{{ w.hasUrl }}\" hint-placeholder-val=\"{{ true }}\"><a href=\"{{ w.url }}\" target=\"_blank\" rel=\"noopener noreferrer\">{{ w.linkText }}<\u002Fa><\u002Fsc-if><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-top:22px;\">\n            <div style=\"background:#fffdf9;border:1px solid #f0d9bd;border-radius:14px;padding:16px 17px;\">\n              <div style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:15px;color:#7a4a1e;margin-bottom:10px;\">Data, na která se opřít<\u002Fdiv>\n              <ul style=\"margin:0;padding-left:18px;display:grid;gap:9px;font-size:14px;color:#4a4452;\">\n                <li><strong>NUDZ:<\u002Fstrong> ~40 % sledovaných deváťáků známky střední až těžké deprese, ~30 % úzkosti — <a href=\"https://www.nudz.cz/media-pr/tiskove-zpravy/narodni-monitoring-dusevniho-zdravi-deti-40-vykazuje-znamky-stredni-az-tezke-deprese-30-uzkosti-odbornici-pripravuji-preventivni-opatreni\" target=\"_blank\" rel=\"noopener noreferrer\">screeningové výsledky<\u002Fa>, ne klinické diagnózy.<\u002Fli>\n                <li><strong>ČŠI<\u002Fstrong> zveřejnila <a href=\"https://www.csicr.cz/cz/Aktuality/Skoly%2C-ktere-posiluji-odolnost-Inspirace-pro-zakla\" target=\"_blank\" rel=\"noopener noreferrer\">„Školy, které posilují odolnost\"<\u002Fa> (5.&nbsp;11.&nbsp;2025).<\u002Fli>\n                <li><strong>HBSC:<\u002Fstrong> do školy se skutečně těší <a href=\"https://zdravagenerace.cz/media/cesky-rozhlas-studie-do-skoly-se-skutecne-tesi-devet-procent-ceskych-deti/\" target=\"_blank\" rel=\"noopener noreferrer\">9&nbsp;% českých dětí<\u002Fa> (doplnit rok sběru a věk).<\u002Fli>\n              <\u002Ful>\n            <\u002Fdiv>\n            <div style=\"background:#fffdf9;border:1px solid #f0d9bd;border-radius:14px;padding:16px 17px;\">\n              <div style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:15px;color:#7a4a1e;margin-bottom:10px;\">Programy (SEL · wellbeing · rezilience)<\u002Fdiv>\n              <div style=\"display:flex;flex-wrap:wrap;gap:7px;\">\n                <sc-for list=\"{{ schoolPrograms }}\" as=\"p\" hint-placeholder-count=\"11\">\n                  <sc-if value=\"{{ p.hasUrl }}\" hint-placeholder-val=\"{{ false }}\"><a href=\"{{ p.url }}\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-size:13px;font-weight:700;background:#fbe6d2;border:1px solid #f0c79c;border-radius:999px;padding:5px 11px;text-decoration:none;color:#9a5a25;\">{{ p.name }}<\u002Fa><\u002Fsc-if>\n                  <sc-if value=\"{{ p.noUrl }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font-size:13px;font-weight:700;background:#f7efe2;border:1px solid #ecdcc2;border-radius:999px;padding:5px 11px;color:#6f5a3a;\">{{ p.name }}<\u002Fspan><\u002Fsc-if>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#9a7a52;margin-top:10px;\">Ne všechny užívají přímo pojem „resilience\"; evaluace mají různou úroveň.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-top:16px;\">\n            <div style=\"background:#fffdf9;border:1px solid #f0d9bd;border-radius:14px;padding:16px 17px;\">\n              <div style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:15px;color:#7a4a1e;margin-bottom:8px;\">Blízké nástroje &amp; infrastruktura<\u002Fdiv>\n              <div style=\"font-size:13.8px;color:#4a4452;\"><strong>Nástroje:<\u002Fstrong> Pět&nbsp;P, Lata, Hodina&nbsp;H, SOCIOKLIMA, Nenech to být / FaceUp, nástroje ČŠI.<\u002Fdiv>\n              <div style=\"font-size:13.8px;color:#4a4452;margin-top:7px;\"><strong>Infrastruktura:<\u002Fstrong> PPP, SPC a ŠPP; Partnerství pro vzdělávání 2030+; MAP; centra a týmy duševního zdraví; Eduzměna (Kutnohorsko); Škola podporující zdraví.<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#fffdf9;border:1px solid #f0d9bd;border-radius:14px;padding:16px 17px;\">\n              <div style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:15px;color:#7a4a1e;margin-bottom:8px;\">Zahraniční metodiky (bez potvrzeného plošného zavedení)<\u002Fdiv>\n              <div style=\"font-size:13.8px;color:#4a4452;\">FRIENDS Resilience, PATHS, RULER, MindUP, Roots of Empathy. Absence v mapě není důkaz nulového používání; import vyžaduje ověření licence, české adaptace, nákladů a evidence účinnosti.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:20px;\">\n            <div style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:15px;color:#7a4a1e;margin-bottom:10px;display:flex;align-items:center;gap:8px;\"><span aria-hidden=\"true\">🎈<\u002Fspan> Vhled pro Nevypusť — školy<\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;\">\n              <div style=\"background:#e4f0e8;border:1px solid #c4e0d0;border-radius:14px;padding:14px 15px;\">\n                <div style=\"font-size:12px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#2f7d57;margin-bottom:8px;\">Příležitost<\u002Fdiv>\n                <ul style=\"margin:0;padding-left:18px;display:grid;gap:7px;font-size:13.5px;color:#3a4a40;\">\n                  <li>Odolávání obtížným situacím v závazném RVP = legitimní potřeba metodické podpory škol (ne automatická poptávka po konkrétním programu).<\u002Fli>\n                  <li>Změny podpůrných pozic mohou otevřít prostor pro metodiky a vzdělávání — ověřit rozhovory se školami.<\u002Fli>\n                  <li>OP JAK, Eduzměna a regionální týmy jako možní partneři; způsobilost ověřit dle aktuální výzvy.<\u002Fli>\n                <\u002Ful>\n              <\u002Fdiv>\n              <div style=\"background:#f7e3de;border:1px solid #ecc9c0;border-radius:14px;padding:14px 15px;\">\n                <div style=\"font-size:12px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#b3503f;margin-bottom:8px;\">Hrozba<\u002Fdiv>\n                <ul style=\"margin:0;padding-left:18px;display:grid;gap:7px;font-size:13.5px;color:#5a3a33;\">\n                  <li>Konkurenční a různorodé pole — licencované, evaluované i volně dostupné programy. NVD musí doložit přidanou hodnotu a účinnost.<\u002Fli>\n                  <li>Komerční konkurence o kurzy pro pedagogy (Kouči do škol, DESCARTES, Zřetel, INFRA).<\u002Fli>\n                  <li>K 21.&nbsp;6.&nbsp;2026 nepotvrzena otevřená „Šablony III\" — před finančním plánem kontrola harmonogramu OP JAK.<\u002Fli>\n                <\u002Ful>\n              <\u002Fdiv>\n              <div style=\"background:#efeae0;border:1px solid #ddd4c5;border-radius:14px;padding:14px 15px;\">\n                <div style=\"font-size:12px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#7a6f5c;margin-bottom:8px;\">Dobré vědět<\u002Fdiv>\n                <ul style=\"margin:0;padding-left:18px;display:grid;gap:7px;font-size:13.5px;color:#534b3d;\">\n                  <li>Rámec ČŠI lze citovat jako oporu pro pojetí, které vedle individuální rezilience žáka zdůrazňuje i kvalitu školního prostředí.<\u002Fli>\n                  <li>Pro školy bývá srozumitelnější jazyk „wellbeing a sociálně-emoční učení\" než „resilience training\".<\u002Fli>\n                <\u002Ful>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsection>\n\n    <!-- OUR LENS + REVIEW -->\n    <section aria-labelledby=\"optika-h\" id=\"optika\" style=\"margin:44px 0;scroll-margin-top:72px;\">\n      <h2 id=\"optika-h\" style=\"font-family:'Fredoka',sans-serif;font-weight:600;color:#5b3f86;font-size:clamp(24px,4vw,32px);margin:0 0 4px;\">Naše optika<\u002Fh2>\n      <p style=\"color:#6f6878;font-size:15px;margin:0 0 20px;max-width:720px;\">Čím se v NVD řídíme, když mluvíme o rezilienci.<\u002Fp>\n\n      <!-- Kirby framework band -->\n      <div style=\"background:#efe3f3;border:1px solid #e0d0ec;border-radius:20px;padding:24px 24px 22px;\">\n        <div style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:20px;color:#5b3f86;margin-bottom:6px;\">Jak rezilienci chápeme my — komunitní pojetí (Kirby, 2025)<\u002Fdiv>\n        <p style=\"font-size:15.5px;color:#4a4452;max-width:760px;margin:0 0 18px;\">Rezilience je <strong>sociální dynamika a proces<\u002Fstrong>, ne vlastnost jednotlivce. Vymezuje se proti „engineering\" pojetí (jen odolat šoku a vrátit se do starého normálu). Aktivačním mechanismem je <strong>participace<\u002Fstrong> — a rozpadá se do čtyř provázaných dimenzí.<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px;\">\n          <sc-for list=\"{{ kirbyDims }}\" as=\"d\" hint-placeholder-count=\"4\">\n            <div style=\"background:#fffdf9;border:1px solid #e6d8ef;border-radius:13px;padding:14px 15px;\">\n              <div style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:15px;color:#7a4eb0;margin-bottom:5px;\">{{ d.label }}<\u002Fdiv>\n              <div style=\"font-size:13.6px;color:#4a4452;\">{{ d.body }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"margin-top:14px;font-size:13.5px;color:#6a5a80;background:#f6eefb;border-radius:10px;padding:10px 13px;\">Participace je <strong>průřezový princip<\u002Fstrong> — motor odolnosti, ne jeden bod ve výčtu.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- CROSS-CUTTING LAYERS -->\n    <section aria-labelledby=\"layers-h\" id=\"vrstvy\" style=\"margin:44px 0;scroll-margin-top:72px;\">\n      <h2 id=\"layers-h\" style=\"font-family:'Fredoka',sans-serif;font-weight:600;color:#5b3f86;font-size:clamp(24px,4vw,32px);margin:0 0 4px;\">Průřezové vrstvy<\u002Fh2>\n      <p style=\"color:#6f6878;font-size:15px;margin:0 0 20px;max-width:680px;\">Co prostupuje všemi světy: akademické zdroje, knihy a popularizace, kritika pojmu a donoři.<\u002Fp>\n\n      <div style=\"display:grid;gap:14px;\">\n        <sc-for list=\"{{ layers }}\" as=\"L\" hint-placeholder-count=\"4\">\n          <article id=\"layer-{{ L.id }}\" style=\"background:#fffdf9;border:1px solid #e7dcc6;border-radius:18px;overflow:hidden;\">\n            <button type=\"button\" onclick=\"{{ L.toggle }}\" aria-expanded=\"{{ L.open }}\" aria-controls=\"layer-body-{{ L.id }}\" style=\"width:100%;display:flex;gap:14px;align-items:center;text-align:left;background:transparent;border:none;cursor:pointer;padding:18px 22px;font-family:inherit;\">\n              <span aria-hidden=\"true\" style=\"flex:none;display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:11px;background:#efe3f3;color:#7a4eb0;font-size:20px;\">{{ L.icon }}<\u002Fspan>\n              <span style=\"flex:1;\">\n                <span style=\"display:block;font-family:'Fredoka',sans-serif;font-weight:600;font-size:19px;color:#3a2f4d;\">{{ L.title }}<\u002Fspan>\n                <span style=\"display:block;font-size:13px;color:#8a8294;margin-top:1px;\">{{ L.sub }}<\u002Fspan>\n              <\u002Fspan>\n              <span aria-hidden=\"true\" style=\"flex:none;color:#9a82c4;font-size:20px;transition:transform .2s ease;transform:{{ L.chev }};\">▸<\u002Fspan>\n            <\u002Fbutton>\n            <sc-if value=\"{{ L.open }}\" hint-placeholder-val=\"{{ false }}\">\n              <div id=\"layer-body-{{ L.id }}\" class=\"nvd-reveal\" style=\"padding:0 22px 22px;\">\n                <sc-if value=\"{{ L.hasIntro }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-size:15px;color:#4a4452;max-width:760px;margin:0 0 16px;\">{{ L.intro }}<\u002Fp><\u002Fsc-if>\n                <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;\">\n                  <sc-for list=\"{{ L.blocks }}\" as=\"b\" hint-placeholder-count=\"4\">\n                    <div style=\"background:#f7f1e6;border:1px solid #ece1d0;border-radius:13px;padding:14px 15px;\">\n                      <div style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:14px;color:#5b3f86;margin-bottom:9px;\">{{ b.label }}<\u002Fdiv>\n                      <ul style=\"list-style:none;margin:0;padding:0;display:grid;gap:7px;\">\n                        <sc-for list=\"{{ b.items }}\" as=\"it\" hint-placeholder-count=\"4\">\n                          <li style=\"font-size:14px;color:#4a4452;line-height:1.45;\">\n                            <sc-if value=\"{{ it.hasUrl }}\" hint-placeholder-val=\"{{ true }}\"><a href=\"{{ it.url }}\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-weight:700;\">{{ it.name }}<\u002Fa><\u002Fsc-if>\n                            <sc-if value=\"{{ it.noUrl }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font-weight:700;color:#38323f;\">{{ it.name }}<\u002Fspan><\u002Fsc-if>\n                            <sc-if value=\"{{ it.hasNote }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"color:#6f6878;\"> — {{ it.note }}<\u002Fspan><\u002Fsc-if>\n                          <\u002Fli>\n                        <\u002Fsc-for>\n                      <\u002Ful>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Farticle>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- SYNTHESIS -->\n    <section aria-labelledby=\"syn-h\" id=\"synteza\" style=\"margin:44px 0;background:#5b3f86;border-radius:24px;padding:34px 30px;color:#f3eafb;scroll-margin-top:72px;\">\n      <h2 id=\"syn-h\" style=\"font-family:'Fredoka',sans-serif;font-weight:600;color:#fffdf9;font-size:clamp(24px,4vw,32px);margin:0 0 18px;\">Syntéza<\u002Fh2>\n      <ol style=\"margin:0;padding-left:22px;display:grid;gap:13px;font-size:15.5px;color:#e6dbf3;max-width:840px;\">\n        <sc-for list=\"{{ synthesis }}\" as=\"s\" hint-placeholder-count=\"5\"><li>{{ s }}<\u002Fli><\u002Fsc-for>\n      <\u002Fol>\n      <div style=\"margin-top:24px;padding-top:18px;border-top:1px solid #74599b;display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px;\">\n        <div>\n          <div style=\"font-size:11.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#c5aee2;margin-bottom:6px;\">K jistotě a použití<\u002Fdiv>\n          <div style=\"font-size:13.5px;color:#d8c9ec;\">Mapa není úplným seznamem. Marketingová čísla organizací nejsou nezávislou evaluací. Zařazení „příležitost / riziko\" je analytický odhad z pohledu NVD.<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:11.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#c5aee2;margin-bottom:6px;\">Hlavní ověřovací zdroje<\u002Fdiv>\n          <div style=\"font-size:13.5px;display:flex;flex-wrap:wrap;gap:6px;\">\n            <a href=\"https://prohlednout.rvp.cz/zakladni-vzdelavani/klicove-kompetence/kos/odo\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"color:#f3cda6;\">RVP ZV<\u002Fa><span style=\"color:#74599b;\">·<\u002Fspan>\n            <a href=\"https://www.csicr.cz/cz/Aktuality/Skoly%2C-ktere-posiluji-odolnost-Inspirace-pro-zakla\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"color:#f3cda6;\">ČŠI<\u002Fa><span style=\"color:#74599b;\">·<\u002Fspan>\n            <a href=\"https://core-resilience.cz/\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"color:#f3cda6;\">CoRe<\u002Fa><span style=\"color:#74599b;\">·<\u002Fspan>\n            <a href=\"https://www.syri.cz/vyzkum/spolecenska-odolnost\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"color:#f3cda6;\">SYRI<\u002Fa><span style=\"color:#74599b;\">·<\u002Fspan>\n            <a href=\"https://www.esfcr.cz/vyzva-108-opz-plus\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"color:#f3cda6;\">OPZ+ 108<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- FOOTER -->\n    <footer style=\"margin-top:28px;text-align:center;font-size:13px;color:#8a8294;\">\n      <p style=\"margin:0 0 6px;\">Interní podklad pro tým Nevypusť duši — prosím nešířit. Připomínky na <a href=\"https://trello.com/c/ak9Z4uOO/507-inspirace-pro-re%C5%A1er%C5%A1i-odolnost-rezilinece-atp\" target=\"_blank\" rel=\"noopener noreferrer\">Trello kartu<\u002Fa>.<\u002Fp>\n      <p style=\"margin:0;\">Human-in-the-loop rešerše · Petra Kutálková · stav k 21.&nbsp;6.&nbsp;2026 · stránka noindex/nofollow.<\u002Fp>\n    <\u002Ffooter>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { open: {}, schoolsOpen: false, query: '', filter: 'all' };\n\n  toggleId(id){ this.setState(s => ({ open: { ...s.open, [id]: !s.open[id] } })); }\n\n  allOpenMap(){\n    const open = {};\n    this.rawWorlds().forEach(w => { open['world-' + w.id] = true; });\n    this.rawLayers().forEach(L => { open['layer-' + L.id] = true; });\n    return open;\n  }\n  expandAll(){ this.setState({ open: this.allOpenMap(), schoolsOpen: true }); }\n  collapseAll(){ this.setState({ open: {}, schoolsOpen: false }); }\n  printAll(){ this.setState({ open: this.allOpenMap(), schoolsOpen: true }, () => { setTimeout(() => window.print(), 150); }); }\n\n  openAndScroll(id){\n    const key = 'world-' + id;\n    this.setState(s => ({ open: { ...s.open, [key]: true } }), () => {\n      const el = document.getElementById(key);\n      if (el){\n        const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n        const top = el.getBoundingClientRect().top + window.scrollY - 16;\n        window.scrollTo({ top, behavior: reduce ? 'auto' : 'smooth' });\n      }\n    });\n  }\n\n  searchUrl(name){\n    return 'https://www.google.com/search?q=' + encodeURIComponent(name + ' rezilience odolnost');\n  }\n  proc(items){\n    return (items || []).map(it => {\n      const real = !!it.u;\n      return {\n        name: it.n, note: it.d || '',\n        url: real ? it.u : this.searchUrl(it.n),\n        hasUrl: true, noUrl: false, isSearch: !real, hasNote: !!it.d\n      };\n    });\n  }\n\n  rawWorlds(){\n    return [\n      {\n        id: 'w1', num: '1', short: 'Komunitní', title: 'Komunitní a sociální rezilience',\n        keyword: 'komunita · soudržnost',\n        bg: '#fbe6d2', accent: '#cf7f3c', accentSoft: '#f0c79c', balloon: '#ef9e63',\n        desc: 'Rezilience jako soudržné sousedství, důvěra a schopnost komunity zvládat změnu. V dohledaných českých zdrojích jsou nejvíc vidět praktičtí aktéři; explicitní propojení komunitní rezilience, designu služeb a duševního zdraví se objevovalo méně často.',\n        groups: [\n          { label: 'Akademie / výzkum', color: '#5b6cb0', items: [\n            { n:'CoRe (FF UK)', d:'2023–2028, podpora téměř 0,5 mld. Kč; řešitel Petr Kratochvíl — konflikt a rezilience české společnosti (makroúroveň)', u:'https://core-resilience.cz/' },\n            { n:'KISK FF MU', d:'propojení komunity, rezilience a designu informačních služeb', u:'https://kisk.phil.muni.cz/' },\n            { n:'Sociologický ústav AV ČR', d:'sociální koheze', u:'https://www.soc.cas.cz/' },\n            { n:'PAQ Research (D. Prokop)', d:'data o nerovnostech', u:'https://www.paqresearch.cz/' },\n          ]},\n          { label: 'NNO / iniciativy', color: '#2f7d57', items: [\n            { n:'NaZemi + Re-set', d:'Brno; semináře „Jak posilovat komunitní odolnost ve své obci?\"', u:'https://nazemi.cz/' },\n            { n:'CpKP', d:'Centrum pro komunitní práci — infrastruktura participace', u:'https://www.cpkp.cz/' },\n            { n:'Agora CE', d:'komunitní plánování a participace', u:'https://www.agora-ce.cz/' },\n            { n:'Glopolis', d:'český překlad materiálu „Odolnost v praxi\"', u:'https://glopolis.org/' },\n            { n:'Diakonie „Odolná obec\"', d:'pozor: navzdory názvu klimaticko-krizové (voda, povodně), ne komunitní práce', u:'https://www.odolnaobec.cz/' },\n            { n:'Česká asociace streetwork', d:'Týden nízkoprahových klubů 2026 (radikalizace, resilience)', u:'https://www.streetwork.cz/clanky/tyden-nizkoprahovych-klubu-2026' },\n            { n:'Člověk v tísni', d:'humanitární pomoc a obnova na Ukrajině', u:'https://www.clovekvtisni.cz/od-potravinove-pomoci-k-velkym-infrastrukturnim-projektum-pres-3-6-milionu-ukrajincu-a-ukrajinek-ziskalo-humanitarni-pomoc-z-ceska-12340gp' },\n            { n:'Charita ČR', d:'Rok s Ukrajinou — obnova a soběstačnost', u:'https://www.charita.cz/prispejte-na-ukrajinu/predchozi-rocnik-UA/' },\n          ]},\n          { label: 'Stát', color: '#b3503f', items: [\n            { n:'MMR' }, { n:'Úřad vlády', d:'komunitní práce' }, { n:'MV / HZS' }, { n:'MPSV', d:'komunitní plánování' },\n          ]},\n          { label: 'Nadace', color: '#a9893f', items: [\n            { n:'Nadace Via', d:'„Jak využít krizi k větší odolnosti českých komunit?\" (2020)', u:'https://www.nadacevia.cz/2020/11/16/jak-vyuzit-krizi-k-vetsi-odolnosti-ceskych-komunit/' },\n            { n:'Nadace OSF', d:'Stronger Roots 2026–2027 — financuje rezilience neziskovek', u:'https://osf.cz/en/roadmap-of-our-work/stronger-roots/stronger-roots-2026_2027/' },\n w.balloon,\n            hay: (it.n + ' ' + (it.d || '') + ' ' + w.title + ' ' + w.short + ' ' + g.label).toLowerCase(),\n          });\n        });\n      });\n      // also index lens text under each world\n      [].concat(w.opp, w.threat, w.note).forEach(() => {});\n    });\n\n    let results = index;\n    if (filter !== 'all') results = results.filter(r => r.worldId === filter);\n    if (q.length >= 2) results = results.filter(r => r.hay.includes(q));\n\n    const searchActive = q.length >= 2 || filter !== 'all';\n    const noResults = searchActive && results.length === 0;\n    const resultLabel = noResults ? '' : (results.length + (results.length === 1 ? ' aktér' : (results.length >= 2 && results.length <= 4 ? ' aktéři' : ' aktérů')));\n\n    const chipDefs = [{ id:'all', label:'Vše' }].concat(worldsRaw.map(w => ({ id:w.id, label: w.num + ' · ' + w.short, balloon: w.balloon })));\n    const chips = chipDefs.map(c => {\n      const active = filter === c.id;\n      return {\n        label: c.label, active,\n        onClick: () => this.setState({ filter: c.id }),\n        bg: active ? '#5b3f86' : '#f7f1e6',\n        fg: active ? '#fffdf9' : '#5b3f86',\n        border: active ? '#5b3f86' : '#e0d2bb',\n      };\n    });\n\n    const layersRaw = this.rawLayers();\n    const layers = layersRaw.map(L => ({\n      id: L.id, icon: L.icon, title: L.title, sub: L.sub,\n      open: !!open['layer-' + L.id],\n      chev: open['layer-' + L.id] ? 'rotate(90deg)' : 'rotate(0deg)',\n      toggle: () => this.toggleId('layer-' + L.id),\n      hasIntro: !!L.intro, intro: L.intro || '',\n      blocks: (L.blocks || []).map(b => ({ label: b.label, items: this.proc(b.items) })),\n    }));\n\n    const schoolWindow = [\n      { num:'1', head:'Revidovaný RVP ZV', body:'obsahuje „Resilience: odolávání obtížným situacím\" — ne samostatná kompetence, ale součást „Vlastního wellbeingu\". Vzdělávat lze od 9/2025, povinný náběh 9/2027 (1. a 6. ročník), konec 9/2031.', url:'https://prohlednout.rvp.cz/zakladni-vzdelavani/klicove-kompetence/kos/odo', hasUrl:true, linkText:'RVP ZV →' },\n      { num:'2', head:'Financování podpůrných pozic', body:'od 1/2026 možnost hradit školního psychologa, speciálního a případně sociálního pedagoga ze státního rozpočtu ve školách se 180+ žáky (ne automaticky všechny pozice).', url:'https://edu.gov.cz/podpurne-pozice-na-zakladnich-skolach/', hasUrl:true, linkText:'MŠMT →' },\n      { num:'3', head:'Multidisciplinární služby', body:'rozvíjejí se služby duševního zdraví napojené na školy; rozsah se liší podle projektu a území.', url:this.searchUrl('multidisciplinární týmy duševního zdraví školy'), hasUrl:true, linkText:'Hledat ⌕' },\n    ];\n\n    const schoolPrograms = [\n      { name:'Zipyho kamarádi' }, { name:'Druhý krok' }, { name:'Akčňáci' }, { name:'Kočičí zahrada' },\n      { name:'DOBRONAUTI' }, { name:'Replug.me' }, { name:'KiVa', url:'https://www.scholaempirica.org/metodiky/kiva/' }, { name:'Minimalizace šikany' },\n      { name:'Filozofie pro děti' }, { name:'NUDZ „Všech pět pohromadě\"' },\n      { name:'Society for All – RRRR', url:'https://www.societyforall.cz/pruvodce-metodikou-rrrr/?intl=en-gb' },\n    ].map(p => ({ name: p.name, url: p.url || '', hasUrl: !!p.url, noUrl: !p.url }));\n\n    const synthesis = [\n      'Pět světů je pracovní analytická typologie, ne definitivní členění — diskurzy se překrývají a ovlivňují.',\n      'Velmi viditelné byly školy a duševní zdraví a také bezpečnost, dezinformace a kritická infrastruktura. „Hustota trhu\" by vyžadovala úplný soupis aktérů.',\n      'Pro Nevypusť duši je přirozeným polem duševní zdraví mladých. Pracujeme s komunitním pojetím rezilience (Kirby, 2025); dostupné „Odolné Česko\" je advokačním materiálem zaměřeným spíše na klinicko-individuální pojetí a na služby.',\n      'Ve školství probíhá systémová změna 2025–2031 — vzniká potřeba metodické podpory, ne automatická poptávka po konkrétním programu.',\n      'Kritika individualizace rezilience je relevantní; systémové pojetí může být komunikační výhodou, pokud je podloženo praxí a evaluací.',\n    ];\n\n    const orient = [\n      { num:'01 — Co', title:'Pět světů', body:'Pět diskurzů („světů\") rezilience, které v ČR sdílejí jedno slovo, ale mají jiný slovník, aktéry i peníze.' },\n      { num:'02 — Kdo', title:'Aktéři + Vhled pro Nevypusť', body:'Vybraní veřejně dohledatelní aktéři — akademie, NNO, stát, nadace — a u každého světa příležitost / hrozba / dobré vědět pro NVD.' },\n      { num:'03 — Jak', title:'Orientace → hloubka', body:'Nejdřív rychlá orientace přes balonky a hledání, pak proklik do hloubky: školy, zdroje, donoři, syntéza.' },\n    ];\n\n    const kirbyDims = this.kirbyDims();\n    const reviewBlocks = this.rawReview().map(b => ({ label: b.label, items: this.reviewProc(b.items) }));\n\n    return {\n      orient, worlds, layers, synthesis, schoolWindow, schoolPrograms,\n      kirbyDims, reviewBlocks,\n      reviewOpen: !!open['review'],\n      reviewChev: open['review'] ? 'rotate(90deg)' : 'rotate(0deg)',\n      reviewToggle: () => this.toggleId('review'),\n      toTop: () => {\n        const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n        window.scrollTo({ top: 0, behavior: reduce ? 'auto' : 'smooth' });\n      },\n      query: this.state.query,\n      onSearch: (e) => this.setState({ query: e.target.value }),\n      chips, results, searchActive, noResults, resultLabel,\n      schoolsOpen: this.state.schoolsOpen,\n      schoolsChev: this.state.schoolsOpen ? 'rotate(90deg)' : 'rotate(0deg)',\n      schoolsToggle: () => this.setState(s => ({ schoolsOpen: !s.schoolsOpen })),\n      expandAll: () => this.expandAll(),\n      collapseAll: () => this.collapseAll(),\n      printAll: () => this.printAll(),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
